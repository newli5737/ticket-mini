# api-ticket.bscxau.link - Backend API (port 3050)
server {
    listen 80;
    server_name api-ticket.bscxau.link;

    client_max_body_size 50M;

    # Serve uploaded files directly via nginx
    location /uploads/ {
        alias /home/ubuntu/ticket-mini/apps/api/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Access-Control-Allow-Origin "https://ticket.bscxau.link";
    }

    # API proxy
    location / {
        proxy_pass http://127.0.0.1:3050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
